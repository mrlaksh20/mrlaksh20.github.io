<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Unicode Generator</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 90%; max-width: 600px; background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        h3 { color: var(--accent); margin: 0 0 15px 0; font-size: 1.1rem; text-align: center; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .label { font-size: 11px; color: #8b949e; font-weight: bold; text-transform: uppercase; }
        .status { font-size: 11px; color: #3fb950; font-weight: normal; }
        
        textarea, .output-area { 
            width: 100%; 
            height: 120px; 
            background: #010409; 
            border: 1px solid var(--border); 
            color: #79c0ff; 
            padding: 10px; 
            border-radius: 4px; 
            font-family: monospace; 
            font-size: 13px;
            box-sizing: border-box; 
        }

        .output-area { 
            white-space: pre-wrap; 
            word-break: break-all; 
            cursor: pointer; 
            overflow-y: auto;
            transition: border 0.2s;
        }
        .output-area:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h3>Unicode Payload Encoder</h3>
    
    <div class="label-row">
        <span class="label">Input Payload</span>
    </div>
    <textarea id="input" placeholder="Enter text..." oninput="encode()"></textarea>

    <div style="height: 20px;"></div>

    <div class="label-row">
        <span class="label">Encoded Result (Click to Copy)</span>
        <span id="status" class="status"></span>
    </div>
    <div class="output-area" id="output" onclick="copyToClipboard()">"Waiting..."</div>
</div>

<script>
    function encode() {
        const input = document.getElementById('input').value;
        const outputDiv = document.getElementById('output');
        const status = document.getElementById('status');
        
        if (!input) { 
            outputDiv.innerText = '"Waiting..."'; 
            return; 
        }

        let encoded = "";
        for (let i = 0; i < input.length; i++) {
            encoded += "\\u" + input.charCodeAt(i).toString(16).padStart(4, '0');
        }
        outputDiv.innerText = `"${encoded}"`;
        status.innerText = ""; 
    }

    function copyToClipboard() {
        const outputDiv = document.getElementById('output');
        const text = outputDiv.innerText;
        const status = document.getElementById('status');

        if (text === '"Waiting..."') return;

        navigator.clipboard.writeText(text).then(() => {
            status.innerText = "✔ Copied to clipboard";
            setTimeout(() => { status.innerText = ""; }, 2000);
        });
    }
</script>

</body>
</html>
